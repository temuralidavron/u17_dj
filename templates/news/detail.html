{% extends 'base.html' %}

{% block content %}

<style>

    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        background: #0f172a;
        font-family: 'Poppins', sans-serif;
        color: white;
    }

    .container{
        width: 90%;
        max-width: 1300px;
        margin: 50px auto;
    }

    .title{
        text-align: center;
        font-size: 55px;
        margin-bottom: 50px;
        font-weight: 700;
        background: linear-gradient(to right,#38bdf8,#818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .news-grid{
        display: grid;
        grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
        gap: 30px;
    }

    .news-card{
        background: rgba(30,41,59,0.8);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 25px;
        overflow: hidden;
        transition: 0.4s;
        backdrop-filter: blur(10px);
        position: relative;
    }

    .news-card:hover{
        transform: translateY(-10px);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        border-color: #38bdf8;
    }

    .card-top{
        height: 220px;
        background: linear-gradient(135deg,#38bdf8,#6366f1);
        position: relative;
    }

    .card-top::before{
        content: 'BLOG';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%,-50%);
        font-size: 55px;
        font-weight: 700;
        color: rgba(255,255,255,0.15);
        letter-spacing: 5px;
    }

    .card-body{
        padding: 25px;
    }

    .card-id{
        display: inline-block;
        padding: 6px 14px;
        background: rgba(56,189,248,0.15);
        color: #38bdf8;
        border-radius: 30px;
        font-size: 13px;
        margin-bottom: 18px;
    }

    .card-title{
        font-size: 28px;
        margin-bottom: 15px;
        line-height: 1.3;
    }

    .card-content{
        color: #cbd5e1;
        line-height: 1.8;
        margin-bottom: 25px;
    }

    .card-footer{
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid rgba(255,255,255,0.08);
        padding-top: 18px;
    }

    .card-date{
        color: #94a3b8;
        font-size: 14px;
    }

    .read-btn{
        padding: 10px 18px;
        background: linear-gradient(to right,#38bdf8,#6366f1);
        border-radius: 12px;
        color: white;
        font-size: 14px;
        font-weight: 600;
        transition: 0.3s;
    }

    .read-btn:hover{
        transform: scale(1.05);
    }

    @media(max-width:768px){

        .title{
            font-size: 40px;
        }

        .card-title{
            font-size: 24px;
        }

    }

</style>

<div class="container">

    <h1 class="title">Latest News</h1>

    <div class="news-grid">


        <div class="news-card">

            <div class="card-top"></div>

            <div class="card-body">

                <span class="card-id">
                    #{{ new.id }}
                </span>

                <h2 class="card-title">
                 TITLE  {{ new.title }}
                </h2>

                <p class="card-content">
                    {{ new.content|truncatewords:25 }}
                </p>

                <div class="card-footer">

                    <span class="card-date">
                        {{ new.created_at }}
                    </span>

                    <a href="{% url 'list' %}" class="read-btn">
Back                    </a>

                </div>

            </div>

        </div>


    </div>

</div>

{% endblock %}
