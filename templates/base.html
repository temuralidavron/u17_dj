<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Site</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">


        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <!-- Left side -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                </li>
            </ul>

            <!-- Right side -->
            <ul class="navbar-nav">

                {% if request.user.is_authenticated %}

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'profile' %}">
                            Welcome {{ request.user.username }}
                            ROLE: {{ request.user.role }}
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-warning" href="{% url 'logout' %}">
                            Logout
                        </a>
                         <a class="nav-link text-warning" href="{% url 'profile_like' %}">
                            Profile like
                        </a>
                    </li>

                {% else %}

                    <li class="nav-item">
                        <a class="nav-link text-success" href="{% url 'login' %}">
                            Login
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-info" href="{% url 'register' %}">
                            Register
                        </a>
                    </li>

                {% endif %}

            </ul>

        </div>
    </div>
</nav>


<!-- Main content -->
<div class="container mt-4">

    {% block content %}
    {% endblock %}

    <div class="alert alert-success mt-4">
        Sayt muhofaza qilingan !!!
    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

</body>
</html>
