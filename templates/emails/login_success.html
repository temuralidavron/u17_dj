<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body{
            margin:0;
            padding:0;
            background:#f4f4f4;
            font-family:Arial, Helvetica, sans-serif;
        }

        .container{
            width:600px;
            margin:30px auto;
            background:#fff;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        .header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:25px;
        }

        .content{
            padding:30px;
            color:#333;
            line-height:1.8;
        }

        .btn{
            display:inline-block;
            background:#0d6efd;
            color:white !important;
            text-decoration:none;
            padding:12px 25px;
            border-radius:5px;
            margin-top:20px;
        }

        .footer{
            background:#f8f9fa;
            padding:20px;
            text-align:center;
            color:#777;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h2>Login Successful 🎉</h2>
    </div>

    <div class="content">

        <h3>Salom {{ user.first_name }}!</h3>

        <p>
            Sizning akkauntingizga muvaffaqiyatli kirildi.
        </p>

        <p>
            Agar bu siz bo'lmasangiz, darhol parolingizni o'zgartiring.
        </p>

        <a href="{{ account_url }}" class="btn">
            My Account
        </a>

    </div>

    <div class="footer">
        © 2026 Library System
    </div>

</div>

</body>
</html>
